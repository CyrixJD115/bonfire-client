appId: com.bonfire.client.gui
productName: Bonfire
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: build/icon.png
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
extraResources:
  - from: ../dist/bonfired
    to: daemon/bonfired
